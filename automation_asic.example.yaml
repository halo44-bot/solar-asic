# ═══════════════════════════════════════════════════════════════
# ASIC V18 - PETITS D'ABORD + BASCULE S19 + MULTI ON/OFF
# ═══════════════════════════════════════════════════════════════
#
# LOGIQUE :
#   Matin  : allume TOUS les petits ASIC qui tiennent dans le surplus
#            (en une fois, dès 120W de marge dispo)
#   Plein soleil : si surplus ≥ 3550W → bascule S19, on éteint TOUS
#                  les petits qui ne tiennent plus dans le budget restant
#   Nuage  : si surplus < 3200W pendant 5 min → éteint S19
#            et rallume autant de petits que le solaire restant permet
#   Soir   : éteint d'un coup tous les ASIC qui dépassent le budget
#            (les plus gros en premier : Goldshell AL → KD → IceRiver)
#            Garde au moins 1 petit ASIC tant que surplus ≥ 120W
#
# HELPERS REQUIS (créer dans Paramètres → Appareils → Helpers) :
#   - input_datetime.s19_deficit_depuis     (date+heure)
#   - input_datetime.s19_surplus_depuis     (date+heure)
#   - input_datetime.petits_deficit_depuis  (date+heure)
#
# Ou via configuration.yaml :
# input_datetime:
#   s19_deficit_depuis:    {name: S19 deficit depuis, has_date: true, has_time: true}
#   s19_surplus_depuis:    {name: S19 surplus depuis, has_date: true, has_time: true}
#   petits_deficit_depuis: {name: Petits ASIC deficit, has_date: true, has_time: true}
# ═══════════════════════════════════════════════════════════════

alias: ASIC V18 - MULTI ON/OFF + BASCULE S19
description: >-
  Petits ASIC d'abord (matin/soir) avec allumage/extinction MULTIPLES en une
  fois selon le budget disponible. Bascule sur S19 quand surplus ≥ 3550W.
  Si surplus < 3200W pendant 5 min, éteint S19 et rallume des petits.
mode: single
max_exceeded: silent

triggers:
  - minutes: /1
    trigger: time_pattern

variables:
  # ── Sensors temps réel ──
  prod_solaire: "{{ states('sensor.production_solaire') | float(0) }}"
  conso_ferme:  "{{ states('sensor.consommation_ferme')  | float(0) }}"
  pwr_asic_est: "{{ states('sensor.asic_puissance_estimee') | float(0) }}"
  s19_on:       "{{ is_state('switch.antminer_s19_switch', 'on') }}"

  # ── Constantes (à ajuster si besoin) ──
  pwr_s19:        3400
  pwr_al_box:     480
  pwr_kd_box:     360
  pwr_petit:      100
  marge_secu:     50
  marge_petit:    20
  seuil_on_s19:   3550
  seuil_off_s19:  3200
  seuil_min_petit: 120
  tempo_min:      5

  # ── Surplus réel hors ASIC ──
  surplus_reel: >-
    {{ (prod_solaire - ([conso_ferme - pwr_asic_est, 0] | max) - marge_secu)
       | round(0) }}

  # ── Listes d'ASIC ──
  petits_on: >-
    {{ states.switch
       | selectattr('entity_id', 'match', 'switch\\.(iceriver|goldshell)_.*')
       | selectattr('state', 'eq', 'on')
       | map(attribute='entity_id') | list }}
  petits_off: >-
    {{ states.switch
       | selectattr('entity_id', 'match', 'switch\\.(iceriver|goldshell)_.*')
       | selectattr('state', 'eq', 'off')
       | map(attribute='entity_id') | list }}
  nb_petits_on: "{{ petits_on | length }}"

  # ── Puissance des petits ASIC actuellement allumés ──
  pwr_petits_on: >-
    {% set ns = namespace(t=0) %}
    {% for e in petits_on %}
      {% if 'goldshell_al_box' in e %}{% set ns.t = ns.t + pwr_al_box %}
      {% elif 'goldshell_kd_box' in e %}{% set ns.t = ns.t + pwr_kd_box %}
      {% else %}{% set ns.t = ns.t + pwr_petit %}
      {% endif %}
    {% endfor %}
    {{ ns.t }}

  budget_petits: >-
    {{ ([surplus_reel - (pwr_s19 if s19_on else 0), 0] | max) | round(0) }}

  # ── Timestamps tempo ──
  now_ts:           "{{ now().timestamp() }}"
  s19_def_ts:       "{{ as_timestamp(states('input_datetime.s19_deficit_depuis'))    | float(0) }}"
  s19_sur_ts:       "{{ as_timestamp(states('input_datetime.s19_surplus_depuis'))    | float(0) }}"
  petits_def_ts:    "{{ as_timestamp(states('input_datetime.petits_deficit_depuis')) | float(0) }}"

  s19_def_5min_ok:    "{{ s19_def_ts    > 0 and (now_ts - s19_def_ts)    >= (tempo_min * 60) }}"
  s19_sur_5min_ok:    "{{ s19_sur_ts    > 0 and (now_ts - s19_sur_ts)    >= (tempo_min * 60) }}"
  petits_def_5min_ok: "{{ petits_def_ts > 0 and (now_ts - petits_def_ts) >= (tempo_min * 60) }}"

  # ── LISTES POUR ALLUMAGE/EXTINCTION MULTIPLE ────────────────
  # Ordre d'allumage : IceRiver (100W) → Goldshell KD (360W) → Goldshell AL (480W)
  petits_off_iceriver: >-
    {{ petits_off | reject('search', 'goldshell') | list }}
  petits_off_kd: >-
    {{ petits_off | select('search', 'goldshell_kd_box') | list }}
  petits_off_al: >-
    {{ petits_off | select('search', 'goldshell_al_box') | list }}

  # Sélection des ASIC à allumer tous d'un coup selon budget_petits
  # On parcourt iceriver d'abord (matin) puis Goldshell selon le budget
  asics_a_allumer: >-
    {% set ns = namespace(b=budget_petits, list=[]) %}
    {% for e in petits_off_iceriver %}
      {% if ns.b >= (pwr_petit + marge_petit) and ns.b >= seuil_min_petit %}
        {% set ns.list = ns.list + [e] %}
        {% set ns.b = ns.b - pwr_petit %}
      {% endif %}
    {% endfor %}
    {% for e in petits_off_kd %}
      {% if ns.b >= (pwr_kd_box + marge_petit) %}
        {% set ns.list = ns.list + [e] %}
        {% set ns.b = ns.b - pwr_kd_box %}
      {% endif %}
    {% endfor %}
    {% for e in petits_off_al %}
      {% if ns.b >= (pwr_al_box + marge_petit) %}
        {% set ns.list = ns.list + [e] %}
        {% set ns.b = ns.b - pwr_al_box %}
      {% endif %}
    {% endfor %}
    {{ ns.list }}

  # Ordre d'extinction : Goldshell AL → KD → IceRiver (les plus gros en premier)
  petits_on_al: >-
    {{ petits_on | select('search', 'goldshell_al_box') | list }}
  petits_on_kd: >-
    {{ petits_on | select('search', 'goldshell_kd_box') | list }}
  petits_on_iceriver: >-
    {{ petits_on | reject('search', 'goldshell') | list }}

  # Liste des ASIC à éteindre pour ramener la conso sous budget_petits
  # Garde 1 petit IceRiver allumé si surplus ≥ 120W
  asics_a_eteindre: >-
    {% set ns = namespace(c=pwr_petits_on, list=[], keep=1 if budget_petits >= seuil_min_petit else 0) %}
    {# Goldshell AL d'abord #}
    {% for e in petits_on_al %}
      {% if ns.c > (budget_petits + 10) %}
        {% set ns.list = ns.list + [e] %}
        {% set ns.c = ns.c - pwr_al_box %}
      {% endif %}
    {% endfor %}
    {# Goldshell KD ensuite #}
    {% for e in petits_on_kd %}
      {% if ns.c > (budget_petits + 10) %}
        {% set ns.list = ns.list + [e] %}
        {% set ns.c = ns.c - pwr_kd_box %}
      {% endif %}
    {% endfor %}
    {# IceRiver en dernier — on garde le dernier si budget ≥ 120W #}
    {% set ice_count = petits_on_iceriver | length %}
    {% set ice_max_off = ice_count - ns.keep %}
    {% set ns2 = namespace(n=0) %}
    {% for e in petits_on_iceriver %}
      {% if ns.c > (budget_petits + 10) and ns2.n < ice_max_off %}
        {% set ns.list = ns.list + [e] %}
        {% set ns.c = ns.c - pwr_petit %}
        {% set ns2.n = ns2.n + 1 %}
      {% endif %}
    {% endfor %}
    {{ ns.list }}

  # Liste des ASIC à éteindre lors de la bascule sur S19
  # Après allumage S19, budget restant = surplus_reel - 3400
  asics_a_eteindre_pour_s19: >-
    {% set budget_apres_s19 = ([surplus_reel - pwr_s19, 0] | max) %}
    {% set ns = namespace(c=pwr_petits_on, list=[]) %}
    {% for e in petits_on_al %}
      {% if ns.c > (budget_apres_s19 + 10) %}
        {% set ns.list = ns.list + [e] %}
        {% set ns.c = ns.c - pwr_al_box %}
      {% endif %}
    {% endfor %}
    {% for e in petits_on_kd %}
      {% if ns.c > (budget_apres_s19 + 10) %}
        {% set ns.list = ns.list + [e] %}
        {% set ns.c = ns.c - pwr_kd_box %}
      {% endif %}
    {% endfor %}
    {% for e in petits_on_iceriver %}
      {% if ns.c > (budget_apres_s19 + 10) %}
        {% set ns.list = ns.list + [e] %}
        {% set ns.c = ns.c - pwr_petit %}
      {% endif %}
    {% endfor %}
    {{ ns.list }}

actions:
  # ════════════════════════════════════════════════════════════════
  # ÉTAPE 1 : Mise à jour des compteurs tempo
  # ════════════════════════════════════════════════════════════════

  - choose:
      - conditions:
          - "{{ not s19_on and surplus_reel >= seuil_on_s19 }}"
        sequence:
          - if: ["{{ s19_sur_ts == 0 }}"]
            then:
              - action: input_datetime.set_datetime
                target: {entity_id: input_datetime.s19_surplus_depuis}
                data: {timestamp: "{{ now_ts }}"}
      - conditions:
          - "{{ (not s19_on and surplus_reel < seuil_on_s19) and s19_sur_ts > 0 }}"
        sequence:
          - action: input_datetime.set_datetime
            target: {entity_id: input_datetime.s19_surplus_depuis}
            data: {timestamp: 0}

  - choose:
      - conditions:
          - "{{ s19_on and surplus_reel < seuil_off_s19 }}"
        sequence:
          - if: ["{{ s19_def_ts == 0 }}"]
            then:
              - action: input_datetime.set_datetime
                target: {entity_id: input_datetime.s19_deficit_depuis}
                data: {timestamp: "{{ now_ts }}"}
      - conditions:
          - "{{ (s19_on and surplus_reel >= seuil_off_s19) and s19_def_ts > 0 }}"
        sequence:
          - action: input_datetime.set_datetime
            target: {entity_id: input_datetime.s19_deficit_depuis}
            data: {timestamp: 0}

  - choose:
      - conditions:
          - "{{ nb_petits_on > 0 and pwr_petits_on > (budget_petits + 10) }}"
        sequence:
          - if: ["{{ petits_def_ts == 0 }}"]
            then:
              - action: input_datetime.set_datetime
                target: {entity_id: input_datetime.petits_deficit_depuis}
                data: {timestamp: "{{ now_ts }}"}
      - conditions:
          - "{{ pwr_petits_on <= budget_petits and petits_def_ts > 0 }}"
        sequence:
          - action: input_datetime.set_datetime
            target: {entity_id: input_datetime.petits_deficit_depuis}
            data: {timestamp: 0}

  # ════════════════════════════════════════════════════════════════
  # ÉTAPE 2 : Actions multiples
  # ════════════════════════════════════════════════════════════════

  # ── BASCULE PETITS → S19 ──
  - choose:
      - conditions:
          - "{{ s19_sur_5min_ok and not s19_on }}"
        sequence:
          - target: {entity_id: switch.antminer_s19_switch}
            action: switch.turn_on
          - action: input_datetime.set_datetime
            target: {entity_id: input_datetime.s19_surplus_depuis}
            data: {timestamp: 0}
          # Éteint d'un coup tous les petits qui ne tiennent plus
          - if:
              - "{{ asics_a_eteindre_pour_s19 | length > 0 }}"
            then:
              - target: {entity_id: "{{ asics_a_eteindre_pour_s19 }}"}
                action: switch.turn_off

  # ── EXTINCTION S19 ──
  - choose:
      - conditions:
          - "{{ s19_def_5min_ok and s19_on }}"
        sequence:
          - target: {entity_id: switch.antminer_s19_switch}
            action: switch.turn_off
          - action: input_datetime.set_datetime
            target: {entity_id: input_datetime.s19_deficit_depuis}
            data: {timestamp: 0}

  # ── ALLUMAGE MULTIPLE DES PETITS ASIC ──
  # Allume d'un coup tous les ASIC qui tiennent dans le budget actuel
  - choose:
      - conditions:
          - "{{ asics_a_allumer | length > 0 and not s19_sur_5min_ok }}"
        sequence:
          - target: {entity_id: "{{ asics_a_allumer }}"}
            action: switch.turn_on

  # ── EXTINCTION MULTIPLE DES PETITS ASIC ──
  # Après 5 min de déficit, éteint d'un coup tous les ASIC en trop
  # Garde 1 petit ASIC tant que surplus ≥ 120W
  - choose:
      - conditions:
          - "{{ petits_def_5min_ok and asics_a_eteindre | length > 0 }}"
        sequence:
          - target: {entity_id: "{{ asics_a_eteindre }}"}
            action: switch.turn_off
          - action: input_datetime.set_datetime
            target: {entity_id: input_datetime.petits_deficit_depuis}
            data: {timestamp: 0}

