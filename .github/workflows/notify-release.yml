name: Notify Updates

on:
  release:
    types: [published]
  push:
    branches: [main, master]
  issues:
    types: [opened]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 1. RELEASE PUBLIÉE
  # ═══════════════════════════════════════════════════════════════
  notify_release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Telegram
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        run: |
          MESSAGE=$(cat <<'EOF'
          🚀 *Solar ASIC ${{ github.event.release.tag_name }}*

          *${{ github.event.release.name }}*

          ${{ github.event.release.body }}

          🔗 ${{ github.event.release.html_url }}
          EOF
          )
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode "text=$MESSAGE"

      - name: ntfy
        if: ${{ secrets.NTFY_TOPIC != '' }}
        run: |
          curl -s \
            -H "Title: 🚀 Solar ASIC ${{ github.event.release.tag_name }}" \
            -H "Tags: rocket,sparkles" \
            -H "Priority: high" \
            -H "Click: ${{ github.event.release.html_url }}" \
            -d "${{ github.event.release.name }} — voir details sur GitHub" \
            "${{ secrets.NTFY_URL }}/${{ secrets.NTFY_TOPIC }}"

      - name: Home Assistant
        if: ${{ secrets.HA_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.HA_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "release",
              "tag": "${{ github.event.release.tag_name }}",
              "title": ${{ toJSON(github.event.release.name) }},
              "body": ${{ toJSON(github.event.release.body) }},
              "url": "${{ github.event.release.html_url }}"
            }'

  # ═══════════════════════════════════════════════════════════════
  # 2. COMMIT IMPORTANT (contient [notify] dans le message)
  # ═══════════════════════════════════════════════════════════════
  notify_commit:
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[notify]')
    runs-on: ubuntu-latest
    steps:
      - name: Extract commit info
        id: commit
        run: |
          MSG=$(echo "${{ github.event.head_commit.message }}" | sed 's/\[notify\]//g' | head -c 500)
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "author=${{ github.event.head_commit.author.name }}" >> $GITHUB_OUTPUT

      - name: Telegram
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        run: |
          MESSAGE=$(cat <<'EOF'
          📝 *Solar ASIC — Mise a jour*

          ${{ steps.commit.outputs.msg }}

          _par ${{ steps.commit.outputs.author }}_
          🔗 ${{ github.event.head_commit.url }}
          EOF
          )
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode "text=$MESSAGE"

      - name: ntfy
        if: ${{ secrets.NTFY_TOPIC != '' }}
        run: |
          curl -s \
            -H "Title: 📝 Solar ASIC update" \
            -H "Tags: memo" \
            -H "Click: ${{ github.event.head_commit.url }}" \
            -d "${{ steps.commit.outputs.msg }}" \
            "${{ secrets.NTFY_URL }}/${{ secrets.NTFY_TOPIC }}"

      - name: Home Assistant
        if: ${{ secrets.HA_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.HA_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "commit",
              "title": "Solar ASIC update",
              "body": ${{ toJSON(steps.commit.outputs.msg) }},
              "url": "${{ github.event.head_commit.url }}",
              "author": "${{ steps.commit.outputs.author }}"
            }'

  # ═══════════════════════════════════════════════════════════════
  # 3. ISSUE CRÉÉE PAR TOI (annonces / bugs connus / workarounds)
  # ═══════════════════════════════════════════════════════════════
  notify_issue:
    if: github.event_name == 'issues' && github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Telegram
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        run: |
          MESSAGE=$(cat <<'EOF'
          ⚠️ *Solar ASIC — Annonce*

          *${{ github.event.issue.title }}*

          ${{ github.event.issue.body }}

          🔗 ${{ github.event.issue.html_url }}
          EOF
          )
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode "text=$MESSAGE"

      - name: ntfy
        if: ${{ secrets.NTFY_TOPIC != '' }}
        run: |
          curl -s \
            -H "Title: ⚠️ ${{ github.event.issue.title }}" \
            -H "Tags: warning" \
            -H "Priority: high" \
            -H "Click: ${{ github.event.issue.html_url }}" \
            -d "${{ github.event.issue.body }}" \
            "${{ secrets.NTFY_URL }}/${{ secrets.NTFY_TOPIC }}"

      - name: Home Assistant
        if: ${{ secrets.HA_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.HA_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "issue",
              "title": ${{ toJSON(github.event.issue.title) }},
              "body": ${{ toJSON(github.event.issue.body) }},
              "url": "${{ github.event.issue.html_url }}"
            }'
