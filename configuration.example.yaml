# Loads default set of integrations. Do not remove.
default_config:

frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ── HTTP (CORS pour le dashboard) ─────────────────────────────
http:
  cors_allowed_origins:
    - http://192.168.1.X
    - http://homeassistant.local
    - http://localhost
    - http://100.X.X.X

# ── OPTIMISATIONS ─────────────────────────────────────────────
recorder:
  purge_keep_days: 31
  commit_interval: 60
  exclude:
    domains:
      - weather
      - sun
      - media_player
      - update
  include:
    entities:
      - sensor.production_solaire
      - sensor.consommation_ferme
      - sensor.consommation_reseau
      - sensor.surplus_solaire
      - sensor.injection_reseau
      - sensor.asic_allumes_count
      - sensor.asic_puissance_estimee

logger:
  default: warning

# ── REST COMMANDS ─────────────────────────────────────────────
rest_command:
  ntfy_notify:
    url: "https://ntfy.sh/{{ states('input_text.ntfy_topic') }}"
    method: POST
    headers:
      Title: "{{ title }}"
      Priority: "{{ priority | default('default') }}"
      Tags: "{{ tags | default('solar_energy') }}"
    payload: "{{ message }}"
    content_type: "text/plain"

  telegram_notify:
    url: "https://api.telegram.org/bot{{ token }}/sendMessage"
    method: POST
    headers:
      Content-Type: application/json
    payload: "{\"chat_id\":\"{{ chat_id }}\",\"text\":\"{{ message }}\"}"
    content_type: "application/json"

# ── INPUT TEXT ────────────────────────────────────────────────
input_text:
  ntfy_topic:
    name: "Topic ntfy"
    initial: "solarasic-halo44"
    max: 100

# ── COMMAND LINE SENSORS — F2Pool Legacy V1 (UN seul appel par crypto) ──
command_line:
  - sensor:
      name: "f2pool_btc_raw"
      scan_interval: 300
      unit_of_measurement: "BTC"
      command: "curl -s -H 'F2P-API-SECRET: 58b08xjbrrjqrkerlahddvgkz23xpudverok2tymsoe2exib5xawslicwvwbddg5' https://api.f2pool.com/bitcoin/halo44"
      value_template: "{{ value_json.balance | default(0) }}"
      json_attributes:
        - hashrate
        - worker_length_online
        - value_last_day
        - value_today
        - today_est_base
      command_timeout: 15

  - sensor:
      name: "f2pool_alph_raw"
      scan_interval: 300
      unit_of_measurement: "ALPH"
      command: "curl -s -H 'F2P-API-SECRET: 58b08xjbrrjqrkerlahddvgkz23xpudverok2tymsoe2exib5xawslicwvwbddg5' https://api.f2pool.com/alephium/halo44"
      value_template: "{{ value_json.balance | default(0) }}"
      json_attributes:
        - hashrate
        - worker_length_online
        - value_last_day
        - value_today
        - today_est_base
      command_timeout: 15

  - sensor:
      name: "f2pool_kas_raw"
      scan_interval: 300
      unit_of_measurement: "KAS"
      command: "curl -s -H 'F2P-API-SECRET: 58b08xjbrrjqrkerlahddvgkz23xpudverok2tymsoe2exib5xawslicwvwbddg5' https://api.f2pool.com/kaspa/halo44"
      value_template: "{{ value_json.balance | default(0) }}"
      json_attributes:
        - hashrate
        - worker_length_online
        - value_last_day
        - value_today
      command_timeout: 15

  - sensor:
      name: "f2pool_ltc_raw"
      scan_interval: 300
      unit_of_measurement: "LTC"
      command: "curl -s -H 'F2P-API-SECRET: 58b08xjbrrjqrkerlahddvgkz23xpudverok2tymsoe2exib5xawslicwvwbddg5' https://api.f2pool.com/litecoin/halo44"
      value_template: "{{ value_json.balance | default(0) }}"
      json_attributes:
        - hashrate
        - worker_length_online
        - value_last_day
        - value_today
      command_timeout: 15

  # Antpool KDA — Données Financières (Ton sensor existant)
  - sensor:
      name: "antpool_kda_raw"
      scan_interval: 300
      unit_of_measurement: "KDA"
      command: >
        python3 -c "
        import hmac, hashlib, time, json;
        from urllib.request import urlopen, Request;
        from urllib.parse import urlencode;
        u='TON_USER_ID'; k='TA_CLE_API_32_CHARS_HEX'; s='TON_API_SECRET_32_CHARS_HEX';
        n=str(int(time.time()*1000));
        sig=hmac.new(s.encode(),(u+k+n).encode(),hashlib.sha256).hexdigest().upper();
        body=urlencode({'userId':u,'key':k,'coin':'KDA','nonce':n,'signature':sig}).encode();
        req=Request('https://antpool.com/api/account.htm',data=body,method='POST');
        r=urlopen(req,timeout=15); print(r.read().decode())
        "
      value_template: "{{ value_json.data.balance | default(0) }}"
      json_attributes:
        - data
      command_timeout: 20

  # Antpool KDA Overview — Hashrate & Workers via accountOverview.htm
  # Le script Python est dans /config/scripts/antpool_kda_overview.py
  # (à copier depuis le fichier antpool_kda_overview.py fourni)
  - sensor:
      name: "antpool_kda_overview_raw"
      scan_interval: 300
      command: "python3 /config/scripts/antpool_kda_overview.py"
      value_template: "{{ value_json.data.userId | default('TON_USER_ID') }}"
      json_attributes:
        - data
        - _error
      command_timeout: 25

  - sensor:
      name: "k1pool_rxd_raw"
      scan_interval: 300
      unit_of_measurement: "RXD"
      command: "curl -s https://k1pool.com/api/miner/rxd/TON_ADRESSE_WALLET_RXD"
      value_template: >
        {% set m = value_json.miner %}
        {{ m.pendingBalance | float(0) if m else 0 }}
      json_attributes:
        - miner
      command_timeout: 15


# ── SOLAR ASIC TEMPLATES ──────────────────────────────────────
template:
  - sensor:

      # ── RÉSEAU EDF (CT 1,2,3 — avant onduleur) ──────────────
      - name: "reseau_total"
        unique_id: "reseau_total"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set p1 = states('sensor.refoss_smart_energy_monitor_em_channel_1_power') | float(0) %}
          {% set p2 = states('sensor.refoss_smart_energy_monitor_em_channel_2_power') | float(0) %}
          {% set p3 = states('sensor.refoss_smart_energy_monitor_em_channel_3_power') | float(0) %}
          {{ (p1 + p2 + p3) | round(1) }}

      - name: "consommation_reseau"
        unique_id: "consommation_reseau"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set p = states('sensor.reseau_total') | float(0) %}
          {{ p if p > 0 else 0 }}

      - name: "injection_reseau"
        unique_id: "injection_reseau"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set p = states('sensor.reseau_total') | float(0) %}
          {{ (p * -1) if p < 0 else 0 }}

      - name: "surplus_solaire"
        unique_id: "surplus_solaire"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ states('sensor.injection_reseau') | float(0) }}

      # ── FERME DE MINAGE (CT 4,5,6 — sortie onduleur) ────────
      - name: "consommation_ferme"
        unique_id: "consommation_ferme"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set p4 = states('sensor.refoss_smart_energy_monitor_em_channel_4_power') | float(0) %}
          {% set p5 = states('sensor.refoss_smart_energy_monitor_em_channel_5_power') | float(0) %}
          {% set p6 = states('sensor.refoss_smart_energy_monitor_em_channel_6_power') | float(0) %}
          {{ [p4 + p5 + p6, 0] | max | round(1) }}

      - name: "production_solaire"
        unique_id: "production_solaire"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set ferme  = states('sensor.consommation_ferme') | float(0) %}
          {% set inject = states('sensor.injection_reseau') | float(0) %}
          {{ (ferme + inject) | round(1) }}

      - name: "consommation_maison"
        unique_id: "consommation_maison"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set grid   = states('sensor.consommation_reseau') | float(0) %}
          {% set inject = states('sensor.injection_reseau') | float(0) %}
          {% set asic   = states('sensor.asic_puissance_estimee') | float(0) %}
          {{ [grid + inject - asic, 0] | max | round(0) }}

      # ── COMPTAGE ASIC ────────────────────────────────────────
      - name: "asic_allumes_count"
        unique_id: "asic_allumes_count"
        unit_of_measurement: "ASIC"
        state: >
          {{ expand(
            'switch.iceriver_al0_1_socket_1',
            'switch.iceriver_al0_2_switch_1',
            'switch.iceriver_al0_3_switch_1',
            'switch.iceriver_al0_4_switch_1',
            'switch.iceriver_al0_5_switch_1',
            'switch.iceriver_al0_6_switch_1',
            'switch.iceriver_al0_7_switch_1',
            'switch.iceriver_al0_8_switch_1',
            'switch.iceriver_al0_9_switch_1',
            'switch.iceriver_al0_11_switch_1',
            'switch.iceriver_al0_12_switch_1',
            'switch.iceriver_al0_13_switch_1',
            'switch.iceriver_ks0_switch_1',
            'switch.iceriver_rx0_1_switch_1',
            'switch.iceriver_rx0_2_switch_1',
            'switch.goldshell_al_box_ii_switch_1',
            'switch.goldshell_kd_box_ii_switch_1',
            'switch.antminer_s19_switch'
          ) | selectattr('state','eq','on') | list | count }}

      - name: "asic_puissance_estimee"
        unique_id: "asic_puissance_estimee_tpl"
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        state: >
          {% set on = namespace(total=0) %}
          {% set asics = [
            ('switch.iceriver_al0_1_socket_1',           100),
            ('switch.iceriver_al0_2_switch_1',           100),
            ('switch.iceriver_al0_3_switch_1',           100),
            ('switch.iceriver_al0_4_switch_1',           100),
            ('switch.iceriver_al0_5_switch_1',           100),
            ('switch.iceriver_al0_6_switch_1',           100),
            ('switch.iceriver_al0_7_switch_1',           100),
            ('switch.iceriver_al0_8_switch_1',           100),
            ('switch.iceriver_al0_9_switch_1',           100),
            ('switch.iceriver_al0_11_switch_1',          100),
            ('switch.iceriver_al0_12_switch_1',          100),
            ('switch.iceriver_al0_13_switch_1',          100),
            ('switch.iceriver_ks0_switch_1',             100),
            ('switch.iceriver_rx0_1_switch_1',           100),
            ('switch.iceriver_rx0_2_switch_1',           100),
            ('switch.goldshell_al_box_ii_switch_1',      480),
            ('switch.goldshell_kd_box_ii_switch_1',      360),
            ('switch.antminer_s19_switch',              3400)
          ] %}
          {% for sw, w in asics %}
            {% if is_state(sw, 'on') %}
              {% set on.total = on.total + w %}
            {% endif %}
          {% endfor %}
          {{ on.total }}

      - name: "prochain_asic"
        unique_id: "prochain_asic"
        state: >
          {% set ns = namespace(found='Aucun') %}
          {% set order = [
            ['AL0 1',        'switch.iceriver_al0_1_socket_1'],
            ['AL0 2',        'switch.iceriver_al0_2_switch_1'],
            ['AL0 3',        'switch.iceriver_al0_3_switch_1'],
            ['AL0 4',        'switch.iceriver_al0_4_switch_1'],
            ['AL0 5',        'switch.iceriver_al0_5_switch_1'],
            ['AL0 6',        'switch.iceriver_al0_6_switch_1'],
            ['AL0 7',        'switch.iceriver_al0_7_switch_1'],
            ['AL0 8',        'switch.iceriver_al0_8_switch_1'],
            ['AL0 9',        'switch.iceriver_al0_9_switch_1'],
            ['AL0 11',       'switch.iceriver_al0_11_switch_1'],
            ['AL0 12',       'switch.iceriver_al0_12_switch_1'],
            ['AL0 13',       'switch.iceriver_al0_13_switch_1'],
            ['KS0',          'switch.iceriver_ks0_switch_1'],
            ['RX0 1',        'switch.iceriver_rx0_1_switch_1'],
            ['RX0 2',        'switch.iceriver_rx0_2_switch_1'],
            ['Goldshell AL', 'switch.goldshell_al_box_ii_switch_1'],
            ['Goldshell KD', 'switch.goldshell_kd_box_ii_switch_1'],
            ['S19',          'switch.antminer_s19_switch']
          ] %}
          {% for name, sw in order %}
            {% if ns.found == 'Aucun' and is_state(sw, 'off') %}
              {% set ns.found = name %}
            {% endif %}
          {% endfor %}
          {{ ns.found }}

      # ── F2POOL REVENUS ───────────────────────────────────────
      - name: "f2pool_btc_day"
        unique_id: "f2pool_btc_day"
        unit_of_measurement: "BTC"
        state: "{{ state_attr('sensor.f2pool_btc_raw','value_today') | default(0) }}"

      - name: "f2pool_btc_unpaid"
        unique_id: "f2pool_btc_unpaid"
        unit_of_measurement: "BTC"
        state: "{{ states('sensor.f2pool_btc_raw') | default(0) }}"

      - name: "f2pool_btc_yesterday"
        unique_id: "f2pool_btc_yesterday"
        unit_of_measurement: "BTC"
        state: "{{ state_attr('sensor.f2pool_btc_raw','value_last_day') | default(0) }}"

      - name: "f2pool_btc_workers"
        unique_id: "f2pool_btc_workers"
        state: "{{ state_attr('sensor.f2pool_btc_raw','worker_length_online') | int(0) }}"

      - name: "f2pool_alph_day"
        unique_id: "f2pool_alph_day"
        unit_of_measurement: "ALPH"
        state: "{{ state_attr('sensor.f2pool_alph_raw','value_today') | float(0) }}"

      - name: "f2pool_alph_unpaid"
        unique_id: "f2pool_alph_unpaid"
        unit_of_measurement: "ALPH"
        state: "{{ states('sensor.f2pool_alph_raw') | float(0) }}"

      - name: "f2pool_alph_yesterday"
        unique_id: "f2pool_alph_yesterday"
        unit_of_measurement: "ALPH"
        state: "{{ state_attr('sensor.f2pool_alph_raw','value_last_day') | float(0) }}"

      - name: "f2pool_alph_workers"
        unique_id: "f2pool_alph_workers"
        state: "{{ state_attr('sensor.f2pool_alph_raw','worker_length_online') | int(0) }}"

      - name: "f2pool_kas_day"
        unique_id: "f2pool_kas_day"
        unit_of_measurement: "KAS"
        state: "{{ state_attr('sensor.f2pool_kas_raw','value_today') | float(0) }}"

      - name: "f2pool_kas_unpaid"
        unique_id: "f2pool_kas_unpaid"
        unit_of_measurement: "KAS"
        state: "{{ states('sensor.f2pool_kas_raw') | float(0) }}"

      - name: "f2pool_kas_yesterday"
        unique_id: "f2pool_kas_yesterday"
        unit_of_measurement: "KAS"
        state: "{{ state_attr('sensor.f2pool_kas_raw','value_last_day') | float(0) }}"

      - name: "f2pool_kas_workers"
        unique_id: "f2pool_kas_workers"
        state: "{{ state_attr('sensor.f2pool_kas_raw','worker_length_online') | int(0) }}"

      - name: "f2pool_ltc_day"
        unique_id: "f2pool_ltc_day"
        unit_of_measurement: "LTC"
        state: "{{ state_attr('sensor.f2pool_ltc_raw','value_today') | float(0) }}"

      - name: "f2pool_ltc_unpaid"
        unique_id: "f2pool_ltc_unpaid"
        unit_of_measurement: "LTC"
        state: "{{ states('sensor.f2pool_ltc_raw') }}"

      - name: "f2pool_ltc_yesterday"
        unique_id: "f2pool_ltc_yesterday"
        unit_of_measurement: "LTC"
        state: "{{ state_attr('sensor.f2pool_ltc_raw','value_last_day') | float(0) }}"

      - name: "f2pool_ltc_workers"
        unique_id: "f2pool_ltc_workers"
        state: "{{ state_attr('sensor.f2pool_ltc_raw','worker_length_online') | int(0) }}"

      # ── ANTPOOL KDA ──────────────────────────────────────────
      - name: "antpool_kda_unpaid"
        unique_id: "antpool_kda_unpaid"
        unit_of_measurement: "KDA"
        state: >
          {% set d = state_attr('sensor.antpool_kda_raw','data') %}
          {{ d.balance | default(0) if d else 0 }}

      - name: "antpool_kda_yesterday"
        unique_id: "antpool_kda_yesterday"
        unit_of_measurement: "KDA"
        state: >
          {% set d = state_attr('sensor.antpool_kda_raw','data') %}
          {{ d.earn24Hours | float(0) if d else 0 }}

      - name: "antpool_kda_day"
        unique_id: "antpool_kda_day"
        unit_of_measurement: "KDA"
        state: >
          {% set d = state_attr('sensor.antpool_kda_raw','data') %}
          {{ d.earn24Hours | float(0) if d else 0 }}

      # Extraction des workers actifs de la nouvelle API de Claude
      - name: "antpool_kda_workers"
        unique_id: "antpool_kda_workers"
        state: >
          {% set d = state_attr('sensor.antpool_kda_overview_raw','data') %}
          {{ d.activeWorkerNum | int(0) if d else 0 }}

      # Hashrate 10 min (Converti en TH/s pour le S19)
      - name: "antpool_kda_hashrate"
        unique_id: "antpool_kda_hashrate"
        unit_of_measurement: "TH/s"
        state: >
          {% set d = state_attr('sensor.antpool_kda_overview_raw','data') %}
          {% set hr = d.hsLast10m | float(0) if d else 0 %}
          {{ (hr / 1e12) | round(2) }}

      # Hashrate 24h (Moyenne journalière)
      - name: "antpool_kda_hashrate_24h"
        unique_id: "antpool_kda_hashrate_24h"
        unit_of_measurement: "TH/s"
        state: >
          {% set d = state_attr('sensor.antpool_kda_overview_raw','data') %}
          {% set hr = d.hsLast1d | float(0) if d else 0 %}
          {{ (hr / 1e12) | round(2) }}

      # 🟢 ALIAS POUR TON DASHBOARD (Élimine définitivement les erreurs 404)
      - name: "antpool_kda_hashrate_10m"
        unique_id: "antpool_kda_hashrate_10m_alias"
        unit_of_measurement: "TH/s"
        state: "{{ states('sensor.antpool_kda_hashrate') }}"

      - name: "antpool_kda_hashrate10m"
        unique_id: "antpool_kda_hashrate10m_alias"
        unit_of_measurement: "TH/s"
        state: "{{ states('sensor.antpool_kda_hashrate') }}"

      - name: "antpool_kda_hr"
        unique_id: "antpool_kda_hr_alias"
        unit_of_measurement: "TH/s"
        state: "{{ states('sensor.antpool_kda_hashrate') }}"

      # ── K1POOL RXD ───────────────────────────────────────────
      - name: "f2pool_rxd_day"
        unique_id: "f2pool_rxd_day"
        unit_of_measurement: "RXD"
        state: >
          {% set m = state_attr('sensor.k1pool_rxd_raw','miner') %}
          {{ m.coinsPerDay | float(0) if m else 0 }}

      - name: "f2pool_rxd_unpaid"
        unique_id: "f2pool_rxd_unpaid"
        unit_of_measurement: "RXD"
        state: "{{ states('sensor.k1pool_rxd_raw') | float(0) }}"

      - name: "f2pool_rxd_workers"
        unique_id: "f2pool_rxd_workers"
        state: >
          {% set m = state_attr('sensor.k1pool_rxd_raw','miner') %}
          {{ m.workersOnline | int(0) if m else 0 }}

      - name: "f2pool_rxd_yesterday"
        unique_id: "f2pool_rxd_yesterday"
        unit_of_measurement: "RXD"
        state: >
          {% set m = state_attr('sensor.k1pool_rxd_raw','miner') %}
          {% if m and m.payments is defined and m.payments | length > 0 %}
            {{ m.payments[0].amount | float(0) }}
          {% else %}
            0
          {% endif %}